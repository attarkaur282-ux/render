<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Bot Hosting Board | @notxsatvir</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:linear-gradient(135deg,#0a0f1a,#03060c);font-family:monospace;padding:2rem;color:#fff;}
        .container{max-width:1000px;margin:auto;background:#121928cc;border-radius:2rem;padding:2rem;border:1px solid #0ff;}
        h1{background:linear-gradient(135deg,#0ff,#b700ff);-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center;}
        .owner{text-align:center;color:#0ff;margin-bottom:1.5rem;}
        input,textarea,button{width:100%;padding:0.8rem;margin:0.5rem 0;border-radius:1rem;border:none;}
        input,textarea{background:#0d111c;color:#fff;border:1px solid #2a3a5a;}
        button{background:linear-gradient(90deg,#0ff,#0b7aff);color:#000;font-weight:bold;cursor:pointer;}
        .bot-card{background:#0f1622;padding:1rem;margin:0.5rem 0;border-radius:1rem;border-left:4px solid #0ff;}
        .status-running{color:#0f0;}
        .status-stopped{color:#f00;}
        hr{margin:1rem 0;border-color:#0ff3;}
        .code-editor{font-family:monospace;background:#0a0c12;height:300px;}
    </style>
</head>
<body>
<div class="container">
    <h1>🤖 @notxsatvir · Telegram Hosting Board</h1>
    <div class="owner">Host your own vote/poll/board bot – 24/7 Free</div>
    
    <h3>➕ Host New Bot</h3>
    <input type="text" id="botToken" placeholder="Bot Token from @BotFather">
    <input type="text" id="botName" placeholder="Bot Name (e.g., My Vote Bot)">
    <input type="text" id="boardChat" placeholder="Board Chat ID (optional - @username or group ID)">
    <textarea id="scriptCode" rows="10" placeholder="Paste your full Python bot code here. Use telebot."></textarea>
    <button id="hostBtn">🚀 HOST BOT</button>
    <div id="hostResult" style="margin-top:1rem;color:#0ff;"></div>
    
    <hr>
    <h3>📋 Hosted Bots</h3>
    <div id="botsList">Loading...</div>
</div>

<script>
    async function loadBots() {
        const res = await fetch('/api/list');
        const data = await res.json();
        const container = document.getElementById('botsList');
        if(data.bots && data.bots.length) {
            container.innerHTML = data.bots.map(bot => `
                <div class="bot-card">
                    <strong>${bot.name}</strong> (${bot.username})<br>
                    Token: ${bot.token}<br>
                    Board: ${bot.board_chat || 'Not set'}<br>
                    Status: <span class="${bot.status === 'running' ? 'status-running' : 'status-stopped'}">${bot.status}</span><br>
                    Created: ${bot.created_at}<br>
                    <button onclick="stopBot('${bot.full_token}')">🛑 Stop</button>
                    <button onclick="restartBot('${bot.full_token}')">🔄 Restart</button>
                    <button onclick="deleteBot('${bot.full_token}')">🗑️ Delete</button>
                </div>
            `).join('');
        } else {
            container.innerHTML = '<p>No bots hosted yet.</p>';
        }
    }
    
    async function stopBot(token) {
        const res = await fetch('/api/stop', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({bot_token: token})
        });
        const data = await res.json();
        alert(data.message);
        loadBots();
    }
    
    async function restartBot(token) {
        const res = await fetch('/api/restart', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({bot_token: token})
        });
        const data = await res.json();
        alert(data.message || data.error);
        loadBots();
    }
    
    async function deleteBot(token) {
        if(!confirm('Delete permanently?')) return;
        const res = await fetch('/api/delete', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({bot_token: token})
        });
        const data = await res.json();
        alert(data.message);
        loadBots();
    }
    
    document.getElementById('hostBtn').onclick = async () => {
        const botToken = document.getElementById('botToken').value.trim();
        const botName = document.getElementById('botName').value.trim();
        const boardChat = document.getElementById('boardChat').value.trim();
        const scriptCode = document.getElementById('scriptCode').value.trim();
        
        if(!botToken) return alert('Bot token required');
        if(!scriptCode) return alert('Bot code required');
        
        document.getElementById('hostResult').innerHTML = '⏳ Hosting...';
        
        const res = await fetch('/api/host', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                bot_token: botToken,
                bot_name: botName || 'Hosted Bot',
                board_chat: boardChat,
                script_content: scriptCode
            })
        });
        const data = await res.json();
        if(res.ok) {
            document.getElementById('hostResult').innerHTML = `✅ ${data.message}`;
            document.getElementById('botToken').value = '';
            document.getElementById('botName').value = '';
            document.getElementById('boardChat').value = '';
            document.getElementById('scriptCode').value = '';
            loadBots();
        } else {
            document.getElementById('hostResult').innerHTML = `❌ ${data.error}`;
        }
    };
    
    loadBots();
    setInterval(loadBots, 10000);
</script>
</body>
</html>
